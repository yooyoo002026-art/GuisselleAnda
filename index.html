@theme {
  --color-brand: #7c3aed;
  --color-brand-light: #a78bfa;
  --color-brand-dark: #5b21b6;
  --color-accent: #f59e0b;
  --color-accent-light: #fbbf24;
  --color-surface: #0f0f1a;
  --color-surface-light: #1a1a2e;
  --color-surface-lighter: #252540;
}

html {
  scroll-behavior: smooth;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 20px rgba(124, 58, 237, 0.4); }
  50% { box-shadow: 0 0 40px rgba(124, 58, 237, 0.8); }
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}

.animate-fade-in-up {
  animation: fadeInUp 0.6s ease-out forwards;
}

.animate-fade-in-up-delay-1 { animation-delay: 0.15s; opacity: 0; }
.animate-fade-in-up-delay-2 { animation-delay: 0.3s; opacity: 0; }
.animate-fade-in-up-delay-3 { animation-delay: 0.45s; opacity: 0; }
.animate-fade-in-up-delay-4 { animation-delay: 0.6s; opacity: 0; }

.animate-pulse-glow {
  animation: pulse-glow 2s ease-in-out infinite;
}

.animate-float {
  animation: float 3s ease-in-out infinite;
}`,"index.html":`<!doctype html>
